name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-build:
    name: Lint + Typecheck + Build
    runs-on: ubuntu-latest
    
    # Required permissions to allow the bot to close the PR on failure
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Run Typecheck
        run: npx tsc --noEmit

      - name: Run Build
        run: npm run build

      # This step only runs if any of the steps above (Lint/Typecheck/Build) fail
      - name: Auto-close PR on failure
        if: failure() && github.event_name == 'pull_request'
        run: |
          gh pr close ${{ github.event.pull_request.number }} \
          --comment "❌ Auto-closing PR: The checks (Lint, Typecheck, or Build) failed. Please fix the errors locally and re-open this PR."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}